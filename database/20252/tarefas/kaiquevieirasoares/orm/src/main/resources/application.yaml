spring:
    datasource:
        url: jdbc:postgresql://localhost:5433/atividade_db
        username: postgres
        password: password
        driver-class-name: org.postgresql.Driver

    jpa:
        database-platform: org.hibernate.dialect.PostgreSQLDialect
        hibernate:
            ddl-auto: none
        show-sql: true
        properties:
            hibernate:
                format_sql: true
